version: "3.8"

services:
  # ─── PostgreSQL ───────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: flowops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: flowops
      POSTGRES_PASSWORD: flowops_secret
      POSTGRES_DB: flowops_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowops -d flowops_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: flowops-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API Server ───────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: flowops-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://flowops:flowops_secret@postgres:5432/flowops_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: docker-compose-jwt-secret-change-in-production
      JWT_EXPIRES_IN: 24h
      CORS_ORIGIN: http://localhost:5173
      BODY_SIZE_LIMIT: 10kb
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─── Worker Service ───────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    container_name: flowops-worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://flowops:flowops_secret@postgres:5432/flowops_db
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Frontend Dashboard ──────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: flowops-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:
