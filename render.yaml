services:
  - type: web
    name: flowops-backend
    env: node
    region: ohio
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run db:push && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: flowops-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: flowops-cache
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false

  - type: redis
    name: flowops-cache
    region: ohio
    plan: free
    ipAllowList: []

databases:
  - name: flowops-postgres
    region: ohio
    plan: free
    databaseName: flowops
    user: flowops
